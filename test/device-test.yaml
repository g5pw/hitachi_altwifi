# Hlink2 test configuration


# WokWi doesn't handle RTL8710
esp32:
  board: esp32dev


esphome:
  name: hlink2test
  platformio_options:
    platform_packages:
      - framework-arduino-api @ https://github.com/clsergent/ArduinoCore-API#f470e0a7f7964957d88465ff3ac5a024aa04da06
    build_flags: 
      - -std=gnu++17
      - -DLT_UART_RX_BUFFER_SIZE=1024
    build_unflags:
      -std=gnu++11
  
  # Test API calls
  on_boot:
    - delay: 5s
    - lambda: |-
        id(hlink2ac).dump_config();
    - switch.turn_on: hlink2_buzzer
    - delay: 3s
    - switch.turn_off: hlink2_buzzer
    - delay: 3s
    - lambda: |-
        id(hlink2ac).action_custom_message("STS_IDU", std::vector<std::string>{"Mode", "OnOf"}, 3);
    - delay: 3s
    - lambda: |-
        id(hlink2ac).action_custom_message("CMD_IDU", std::vector<std::string>{"Mode:33", "OnOf:1"}, 3);
    - delay: 3s
    - lambda: |-
        id(hlink2ac).action_custom_message("CMD_IDU", std::vector<std::string>{"Mode:18", "OnOf:0", "Opt1:\"1\""}, 2);


logger:
  level: DEBUG
  # WokWi doesn't handle different UART baudrates
  # So we stick to data UART baudrate
  baud_rate: 9600
  logs:
    wifi: NONE
    wifi_esp32: NONE
    esp_idf: ERROR
    uart: ERROR
    uart_debug: DEBUG
    button: INFO
    climate: INFO
    number: INFO
    select: INFO
    sensor: INFO
    switch: INFO
    text: INFO
    text_sensor: INFO
    "hlink2:core": INFO
    "hlink2:mnemonic": INFO
    "hlink2:message": INFO    
    "hlink2:button": INFO
    "hlink2:climate": INFO
    "hlink2:number": INFO
    "hlink2:sensor": INFO
    "hlink2:switch": INFO
    "hlink2:text": INFO
    "hlink2:text_sensor": INFO


wifi:
  ssid: "SSID"
  password: "PASSWORD"


network:


api:


debug:


uart:
  id: hitachi_bus
  baud_rate: 9600
  tx_pin: GPIO25
  rx_pin: GPIO26
  parity: ODD
  rx_buffer_size: 1024
  # Enabling debug provides access to raw data frames
  debug:
    direction: BOTH
    after:
      delimiter: '\x03'
      bytes: 256
    sequence:
      - lambda: UARTDebug::log_string(direction, bytes);


external_components:
  - source:
      type: git
      url: https://github.com/clsergent/hitachi_altwifi.git
    components: [hlink2]
    # set refresh to 0s to force recompilation
    refresh: 0s
  # Local test
  #- source:
  #    type: local
  #    path: /hitachi_altwifi/components
  #  components: [hlink2]
  #  refresh: 0s #to force recompilation


hlink2:
  id: hlink2ac
  uart_id: hitachi_bus
  parameters:
    # Short timeout to force interrupting processes
    task_timeout: 25ms
    uart_tx_chunck_size: 32
    message_mnemonics_capacity: 15
    message_update_interval: 30s
     # Override message_update_interval for sensors
    sensor_update_interval: 20s
    # override message_update_interval for text_sensors
    text_sensor_update_interval: 1min
    # short message update timeout to stress the firmware
    message_update_timeout: 3s
  mnemonics:
    # Adding a lambda
    - name: SetT
      mode: [STS, CMD]
      dest: IDU
      lambda: |-
        ESP_LOGI("test_yaml", "SetT: is %.1f", mnemonic->get_status<float>(-1));
     # Adding an extra mode to a builtin mnemonic
    - name: Modl
      mode: [STS, CMD]
      dest: IDU
    # Custom mnemonics (from stock firmware)
    - name: SetTR
      mode: [STS, CMD]
      dest: IDU
    - name: PinR
      mode: [STS, CMD]
      dest: IDU
    - name: ItW
      mode: [STS]
      dest: IDU
    - name: Func1
      mode: [STS, CMD]
      dest: IDU
    - name: Func2
      mode: [STS, CMD]
      dest: IDU
    - name: Thmo
      mode: [STS]
      dest: IDU
    - name: Comm
      mode: [STS]
      dest: IDU
    - name: H1
      mode: [STS]
      dest: ODU
    - name: Hs
      mode: [STS, CMD]
      dest: IDU
    - name: Maint
      mode: [STS]
      dest: IDU
    - name: MdDtl
      mode: [STS]
      dest: IDU
    - name: Stat
      mode: [STS]
      dest: IDU

climate:
  - platform: hlink2
    name: AC
    hvac_actions: true
    status:
      qos: low
      update_interval: 5s
    command:
      qos: medium
      buzzer: true
    supported_presets:
      - AWAY
      - SILENCE
    visual:
      min_temperature: 16.0
      max_temperature: 32.0
      temperature_step:
        target_temperature: 0.5
        current_temperature: 0.5

sensor: 
  - platform: hlink2
    outdoor_temperature:
      id: outdoor_temperature
      update_interval: 1min
      qos: high
      promote: false
      lambda: |-
        ESP_LOGI("test_yaml", "mnemonic: %s, sensor: %p", mnemonic->name, sensor);
  - platform: hlink2
    indoor_temperature:
      id: indoor_temperature
      promote: false
  - platform: hlink2
    indoor_humidity: 
      id: indoor_humidity
  - platform: hlink2
    filter_usage:
      id: filter_usage
  - platform: hlink2
    energy:
      id: energy
  - platform: hlink2
    power:
      id: power
  - platform: hlink2
    airflow:
      id: airflow
  - platform: hlink2
    indoor_exchanger:
      id: indoor_exchanger
  - platform: hlink2
    outdoor_exchanger:
      id: outdoor_exchanger

switch:
  - platform: hlink2
    buzzer:
      name: "Buzzer"
      id: hlink2_buzzer
      qos: low
  - platform: hlink2
    led_wifi:
      name: "wifi_led"
  - platform: hlink2
    led_timer:
      name: "timer_led"
  - platform: hlink2
    preset_eco:
      name: "Eco"
  - platform: hlink2
    custom:
      name: "Test"
      mnemonic:
        dest: IDU
        name: Buzz

text_sensor:
  # Builtin sensor
  - platform: hlink2
    model:
      name: "Modèle"
  # Custom sensor with mnemonic as string, custom update, no promotion
  - platform: hlink2
    custom:
      name: "Modèle (custom)"
      mnemonic: IDU_Modl
      # Force promotion with a high value
      update_interval: 24h
      promote: true
  # Custom sensor, custom mnemonic as mapping
  - platform: hlink2
    custom:
      name: "Modèle (custom)"
      mnemonic: 
        name: SetT
        dest: IDU

text:
  - platform: hlink2
    ssid:
      name: "SSID"
  - platform: hlink2
    custom:
      name: "custom"
      mnemonic: IDU_SetT
      mode: text
      raw: true
  - platform: hlink2
    custom:
      name: "custom"
      mnemonic:
        name: Mode
        dest: IDU
      mode: text
      raw: false
      buzzer: false

button:
  - platform: hlink2
    buzzer:
      name: "Buzzer"
  - platform: hlink2
    filter_reset:
      name: "Reset filter"

number:
  - platform: hlink2
    target_temperature:
      name: "target_temperature"

select:
  - platform: hlink2
    custom:
      name: "economy"
      mnemonic: IDU_Opt1
      raw: true
      options:
        - "1"
        - "0"

